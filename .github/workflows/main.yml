name: Build YouTube Bypass

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Скачиваем компилятор через PowerShell (надежнее)
      - name: Setup w64devkit
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com" -OutFile "w64devkit.zip"
          Expand-Archive -Path "w64devkit.zip" -DestinationPath "." -Force

      # 2. Скачиваем WinDivert через PowerShell
      - name: Setup WinDivert
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com" -OutFile "windivert.zip"
          Expand-Archive -Path "windivert.zip" -DestinationPath "." -Force

      # 3. Компиляция (учитываем папку src и utils)
      - name: Compile Exe
        shell: cmd
        run: |
          set PATH=%CD%\w64devkit\bin;%PATH%
          
          # Копируем либы прямо к исходникам для надежности
          copy WinDivert-2.2.2-A\include\WinDivert.h src\
          copy WinDivert-2.2.2-A\x64\WinDivert.lib src\
          
          cd src
          gcc -O3 -s -o ../youtube_fix.exe ^
            goodbyedpi.c blackwhitelist.c dnsredir.c fakepackets.c service.c ttltrack.c ^
            utils/getline.c utils/repl_str.c ^
            -I. -Iutils -L. -lwindivert -lws2_32 -lwinhttp

      # 4. Сборка финального архива
      - name: Prepare Artifact
        shell: cmd
        run: |
          mkdir release
          move youtube_fix.exe release\
          copy WinDivert-2.2.2-A\x64\WinDivert.dll release\
          copy WinDivert-2.2.2-A\x64\WinDivert64.sys release\

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Fix-x64
          path: release/
