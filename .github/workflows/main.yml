name: Build YouTube Bypass

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup w64devkit
        shell: cmd
        run: |
          curl -L https://github.com -o w64devkit.zip
          tar -xf w64devkit.zip

      - name: Setup WinDivert
        shell: cmd
        run: |
          curl -L https://github.com -o windivert.zip
          tar -xf windivert.zip

      - name: Compile Exe
        shell: cmd
        run: |
          set PATH=%CD%\w64devkit\bin;%PATH%
          
          # Копируем библиотеки WinDivert для сборки
          copy WinDivert-2.2.2-A\include\WinDivert.h src\
          copy WinDivert-2.2.2-A\x64\WinDivert.lib src\
          
          # Переходим в папку src и компилируем, указывая путь к utils
          cd src
          gcc -O3 -s -o ../youtube_fix.exe ^
            goodbyedpi.c blackwhitelist.c dnsredir.c fakepackets.c service.c ttltrack.c ^
            utils/getline.c utils/repl_str.c ^
            -I. -Iutils -L. -lwindivert -lws2_32 -lwinhttp

      - name: Prepare Artifact
        shell: cmd
        run: |
          mkdir release
          move youtube_fix.exe release\
          copy WinDivert-2.2.2-A\x64\WinDivert.dll release\
          copy WinDivert-2.2.2-A\x64\WinDivert64.sys release\

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Fix-x64
          path: release/
