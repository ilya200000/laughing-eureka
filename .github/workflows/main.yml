name: Build YouTube Bypass

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Скачиваем инструменты с флагами перенаправления (-L)
      - name: Download Tools
        shell: cmd
        run: |
          curl -Lk https://github.com -o w64devkit.zip
          curl -Lk https://github.com -o windivert.zip

      # 2. Распаковка (теперь файлы будут полными)
      - name: Extract Tools
        shell: cmd
        run: |
          7z x w64devkit.zip -y
          7z x windivert.zip -y

      # 3. Компиляция (учитываем src и utils)
      - name: Compile Exe
        shell: cmd
        run: |
          set PATH=%CD%\w64devkit\bin;%PATH%
          
          copy WinDivert-2.2.2-A\include\WinDivert.h src\
          copy WinDivert-2.2.2-A\x64\WinDivert.lib src\
          
          cd src
          gcc -O3 -s -o ../youtube_fix.exe ^
            goodbyedpi.c blackwhitelist.c dnsredir.c fakepackets.c service.c ttltrack.c ^
            utils/getline.c utils/repl_str.c ^
            -I. -Iutils -L. -lwindivert -lws2_32 -lwinhttp

      # 4. Сборка артефакта
      - name: Prepare Release
        shell: cmd
        run: |
          mkdir release
          move youtube_fix.exe release\
          copy WinDivert-2.2.2-A\x64\WinDivert.dll release\
          copy WinDivert-2.2.2-A\x64\WinDivert64.sys release\

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Fix-Binary
          path: release/
